version: '3.8'

services:
  file-conversion-api:
    build: .
    ports:
      - "30009:30009"
    environment:
      - PORT=30009
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - FILE_CONVERSION_API_KEY=${FILE_CONVERSION_API_KEY:-dev-file-conversion-key}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:30009/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
